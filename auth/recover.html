<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recover Password - Vectra UI Auth</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />
  <link rel="stylesheet" href="../assets/css/ui-kit.css" />
  <link rel="stylesheet" href="../assets/css/auth.css" />
</head>
<body class="uk-bg">
  <main class="container d-flex flex-column justify-content-center align-items-center min-vh-100">
    <div class="auth-card" data-aos="fade-up">
      <div class="auth-header">
        <div class="auth-logo">
          <i class="fa-solid fa-key"></i>
        </div>
        <h1 class="auth-title">Reset Password</h1>
        <p class="auth-subtitle">Enter your email address and we'll send you a link to reset your password.</p>
      </div>

      <form id="recoverForm">
        <div class="form-floating">
          <input type="email" class="form-control" id="recoverEmail" placeholder="name@example.com" required>
          <label for="recoverEmail"><i class="fa-solid fa-envelope me-2"></i>Email address</label>
        </div>

        <button type="submit" class="btn btn-uk w-100 mb-3">
          <i class="fa-solid fa-paper-plane me-2"></i>Send Reset Link
        </button>
      </form>

      <div id="successMessage" class="success-message">
        <i class="fa-solid fa-check-circle me-2"></i>
        If an account with that email exists, we've sent you a password reset link.
      </div>

      <div class="auth-footer">
        Remember your password? <a href="login.html">Sign in</a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script>
    AOS.init();

    document.getElementById('recoverForm').addEventListener('submit', function(e) {
      e.preventDefault();
      // Simulate form submission
      document.getElementById('successMessage').style.display = 'block';
      setTimeout(() => {
        document.getElementById('successMessage').style.display = 'none';
      }, 5000);
    });
  </script>
</body>
</html>
