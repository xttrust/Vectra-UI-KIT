<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Vectra UI Kit</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%2300c2cb'/><text x='50%' y='56%' dominant-baseline='middle' text-anchor='middle' font-family='system-ui' font-weight='700' font-size='18' fill='%2301292b'>V</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../assets/css/vectra.css" />
</head>
<body class="v-auth-body">

  <div class="v-auth-wrap">

    <a href="../index.html" class="v-auth-brand">
      <span class="logo-dot" aria-hidden="true"></span>
      Vectra UI
    </a>

    <div class="v-auth-panel">

      <!-- Request form state -->
      <div id="state-request">
        <div class="v-auth-header">
          <div class="v-icon-box mb-3" style="width:52px;height:52px;font-size:1.4rem">
            <i class="fa-solid fa-lock-open"></i>
          </div>
          <h1>Forgot password?</h1>
          <p>Enter the email for your account and we'll send a reset link.</p>
        </div>

        <form id="recover-form" novalidate>
          <div class="mb-4">
            <label class="form-label" for="recover-email">Email address</label>
            <input type="email" class="form-control" id="recover-email" autocomplete="email"
                   placeholder="alice@example.com" required />
          </div>
          <button type="submit" class="v-btn v-btn-primary w-100 justify-content-center">
            Send Reset Link
          </button>
        </form>
      </div>

      <!-- Sent confirmation state (shown via JS toggle example) -->
      <div id="state-sent" style="display:none">
        <div class="v-auth-header">
          <div class="v-icon-box mb-3" style="width:52px;height:52px;font-size:1.4rem;background:var(--v-success-soft);color:var(--v-success)">
            <i class="fa-solid fa-envelope-circle-check"></i>
          </div>
          <h1>Check your inbox</h1>
          <p>We sent a password reset link to <strong id="sent-email" style="color:var(--v-text)"></strong>. It expires in 15 minutes.</p>
        </div>
        <a href="login.html" class="v-btn v-btn-primary w-100 justify-content-center">Back to Sign In</a>
        <p class="v-auth-footer-text mt-3">
          Didn't receive it? <button type="button" id="resend-btn" class="v-btn-link">Resend email</button>
        </p>
      </div>

      <p class="v-auth-footer-text mt-3" id="back-to-login">
        <a href="login.html"><i class="fa-solid fa-arrow-left fa-xs"></i> Back to Sign In</a>
      </p>
    </div>

    <p class="v-auth-meta">
      <a href="../docs.html">Documentation</a> ·
      <a href="https://github.com/xttrust/Vectra-UI-KIT" target="_blank" rel="noopener">GitHub</a> ·
      <button class="v-theme-toggle-inline" data-toggle="theme" aria-label="Toggle theme">
        <i class="fa-solid fa-circle-half-stroke"></i> Toggle theme
      </button>
    </p>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="../assets/js/vectra.js"></script>
  <script>
    // Demo: show confirmation state on submit
    document.getElementById('recover-form').addEventListener('submit', function (e) {
      e.preventDefault();
      const email = document.getElementById('recover-email').value.trim();
      if (!email) return;
      document.getElementById('sent-email').textContent = email;
      document.getElementById('state-request').style.display = 'none';
      document.getElementById('state-sent').style.display = '';
      document.getElementById('back-to-login').style.display = 'none';
    });
    document.getElementById('resend-btn').addEventListener('click', function () {
      this.textContent = 'Sent!';
      this.disabled = true;
    });
  </script>
</body>
</html>
