<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Vectra UI Auth</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />
  <link rel="stylesheet" href="../assets/css/ui-kit.css" />
  <link rel="stylesheet" href="../assets/css/auth.css" />
</head>
<body class="uk-bg">
  <main class="container d-flex flex-column justify-content-center align-items-center min-vh-100">
    <div class="auth-card" data-aos="fade-up">
      <div class="auth-header">
        <div class="auth-logo">
          <i class="fa-solid fa-shield-alt"></i>
        </div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to your account</p>
      </div>

      <div class="social-login">
        <a href="#" class="social-btn">
          <i class="fa-brands fa-google"></i>
          Continue with Google
        </a>
        <a href="#" class="social-btn">
          <i class="fa-brands fa-github"></i>
          Continue with GitHub
        </a>
      </div>

      <div class="divider">
        <span>or</span>
      </div>

      <form>
        <div class="form-floating">
          <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" required>
          <label for="loginEmail"><i class="fa-solid fa-envelope me-2"></i>Email address</label>
        </div>
        <div class="form-floating">
          <input type="password" class="form-control" id="loginPassword" placeholder="Password" required>
          <label for="loginPassword"><i class="fa-solid fa-lock me-2"></i>Password</label>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label" for="rememberMe">Remember me</label>
          </div>
          <a href="recover.html" class="uk-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-uk w-100 mb-3">
          <i class="fa-solid fa-sign-in-alt me-2"></i>Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one</a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script>
    AOS.init();
  </script>
</body>
</html>
