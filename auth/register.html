<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register - Vectra UI Auth</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />
  <link rel="stylesheet" href="../assets/css/ui-kit.css" />
  <link rel="stylesheet" href="../assets/css/auth.css" />
</head>
<body class="uk-bg">
  <main class="container d-flex flex-column justify-content-center align-items-center min-vh-100">
    <div class="auth-card" data-aos="fade-up">
      <div class="auth-header">
        <div class="auth-logo">
          <i class="fa-solid fa-user-plus"></i>
        </div>
        <h1 class="auth-title">Join Us</h1>
        <p class="auth-subtitle">Create your account to get started</p>
      </div>

      <div class="social-login">
        <a href="#" class="social-btn">
          <i class="fa-brands fa-google"></i>
          Sign up with Google
        </a>
        <a href="#" class="social-btn">
          <i class="fa-brands fa-github"></i>
          Sign up with GitHub
        </a>
      </div>

      <div class="divider">
        <span>or</span>
      </div>

      <form>
        <div class="form-floating">
          <input type="text" class="form-control" id="registerUsername" placeholder="Username" required>
          <label for="registerUsername"><i class="fa-solid fa-user me-2"></i>Username</label>
        </div>
        <div class="form-floating">
          <input type="email" class="form-control" id="registerEmail" placeholder="name@example.com" required>
          <label for="registerEmail"><i class="fa-solid fa-envelope me-2"></i>Email address</label>
        </div>
        <div class="form-floating">
          <input type="password" class="form-control" id="registerPassword" placeholder="Password" required>
          <label for="registerPassword"><i class="fa-solid fa-lock me-2"></i>Password</label>
        </div>
        <div class="form-floating">
          <input type="password" class="form-control" id="registerConfirm" placeholder="Confirm Password" required>
          <label for="registerConfirm"><i class="fa-solid fa-lock me-2"></i>Confirm Password</label>
        </div>

        <div class="terms-check">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="acceptTerms" required>
            <label class="form-check-label" for="acceptTerms">
              I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
            </label>
          </div>
        </div>

        <button type="submit" class="btn btn-uk w-100 mb-3">
          <i class="fa-solid fa-user-plus me-2"></i>Create Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script>
    AOS.init();
  </script>
</body>
</html>
